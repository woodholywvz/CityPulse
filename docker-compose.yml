services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_NAME: CityPulse
      NEXT_PUBLIC_DEFAULT_LOCALE: en
      NEXT_PUBLIC_SUPPORTED_LOCALES: en,ru,kk-cyrl,kk-latn
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PROJECT_NAME: CityPulse API
      ENVIRONMENT: local
      APP_VERSION: 0.1.0
      API_V1_PREFIX: /api
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000
      DATABASE_URL: postgresql+asyncpg://citypulse:citypulse@postgres:5432/citypulse
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production-please-rotate
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      S3_REGION: us-east-1
      S3_BUCKET: citypulse-local
      SEED_DEMO_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: citypulse
      POSTGRES_USER: citypulse
      POSTGRES_PASSWORD: citypulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citypulse -d citypulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
